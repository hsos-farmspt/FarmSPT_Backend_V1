{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmSPT Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/mqtt_dashboard.css' %}">
</head>
<body>
    <header>
        <img src="{% static 'images/logo.png' %}" alt="FarmSPT">
        <h1>MQTT Dashboard</h1>
        <a href="/" class="leave-btn">Leave</a>
    </header>
    
    <main>
        <div class="chat-container">
            <div class="chat-header">MQTT Transport Messages</div>
            <div class="chat-content">
                <!-- Message List (linke Seite - wird dynamisch gefüllt) -->
                <div class="message-list">
                    <!-- Hier werden Messages vom JS eingefügt -->
                </div>
                
                <!-- Message Detail (rechte Seite - 7/8) -->
                <div class="message-detail">
                    <div class="detail-header">
                        <h2>-</h2>
                        <span class="detail-time">-</span>
                    </div>
                    <div class="detail-content">
                        <p>Warte auf Messages...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="{% static 'js/mqtt_dashboard.js' %}"></script>
</body>
</html>
